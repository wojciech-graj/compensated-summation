name: Rust

on:
  workflow_dispatch:
  push:
    branches:
      - '*'
    paths-ignore:
      - '*.md'
  pull_request:

env:
  CARGO_TERM_COLOR: always

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - uses: dtolnay/rust-toolchain@stable
      with:
        targets: x86_64-unknown-none

    - uses: cargo-bins/cargo-binstall@main

    - name: Install cargo-no-std
      run: cargo binstall --no-confirm --force cargo-no-std

    - name: Check
      run: cargo check --verbose --all-features --all-targets

    - name: Check no_std
      run: cargo no-std --no-default-features --features libm

    - name: Build
      run: cargo build --verbose --all-features --all-targets

    - name: Test
      run: cargo test --verbose --all-features

    - name: Clippy
      run: cargo clippy --verbose --all-features --all-targets

    - name: Fmt
      run: cargo fmt --check
